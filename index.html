<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Carte Produit</title>
  </head>
  <body>
    <article class="product">
      <img class="product_image" 
        alt="Product image" 
        src="https://picsum.photos/seed/carnet/480/320"/>
      <h1 class="product_name">Essentiel</h1>
      <div class="product_subname_price">
        <h2 class="product_subname_price_subname" >Carnet</h2>
        <span class="product_subname_price_price" >12.00 €</span>
      </div>
      <p class="product_description">
        Une carte produit simple avec un titre, un texte et un lien.
      </p>
      <a href="#" class="product_details" >Voir le produit</a>
    </article>
  </body>
</html>
